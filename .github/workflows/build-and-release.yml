name: Build and Release

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: Build mode
        type: choice
        required: true
        default: build and release
        options:
          - build and release
          - build and release (force)
          - build only
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: success() && (inputs.build_mode == 'build and release' || inputs.build_mode == 'build and release (force)')

    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

    - name: Download x64 artifact
      uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
      with:
        name: VolumeKeeper-win-x64
        path: ./artifacts/x64

    - name: Download x86 artifact
      uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
      with:
        name: VolumeKeeper-win-x86
        path: ./artifacts/x86

    - name: Download x64 installer artifact
      uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
      with:
        name: VolumeKeeper-installer-x64
        path: ./artifacts/installer-x64

    - name: Download x86 installer artifact
      uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
      with:
        name: VolumeKeeper-installer-x86
        path: ./artifacts/installer-x86

    - name: Rename files
      run: |
        mv "./artifacts/x64/VolumeKeeper.exe" "./artifacts/VolumeKeeper-x64.exe"
        mv "./artifacts/x86/VolumeKeeper.exe" "./artifacts/VolumeKeeper-x86.exe"
        mv "./artifacts/installer-x64/VolumeKeeper-Setup.exe" "./artifacts/VolumeKeeper-Setup-x64.exe"
        mv "./artifacts/installer-x86/VolumeKeeper-Setup.exe" "./artifacts/VolumeKeeper-Setup-x86.exe"

    - name: Delete existing tag and release (only forced releases)
      if: inputs.build_mode == 'build and release (force)'
      run: |
        echo "Deleting tag and release..."
        echo "Tag name: ${{ steps.version.outputs.version }}"
        echo "Release name: ${{ steps.release_name.outputs.release_name }}"
        gh release delete ${{ steps.version.outputs.version }} -y --cleanup-tag
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
      with:
        tag_name: v${{ inputs.version }}
        name: VolumeKeeper v${{ inputs.version }}
        body: |
          ## VolumeKeeper v${{ inputs.version }}

          ### Downloads

          #### Installers (Recommended)
          - **VolumeKeeper-Setup-x64.exe** - Installer for 64-bit Windows
          - **VolumeKeeper-Setup-x86.exe** - Installer for 32-bit Windows

          #### Portable Versions
          - **VolumeKeeper-x64.exe** - Portable executable for 64-bit Windows
          - **VolumeKeeper-x86.exe** - Portable executable for 32-bit Windows

          ### Installation
          **Installer:** Download and run the setup file for automatic installation
          **Portable:** Download the executable and run directly - no installation required

          ### Requirements
          - Windows 10 version 1809 or later
          - No .NET runtime required (self-contained)
        draft: false
        prerelease: false
        files: |
          ./artifacts/VolumeKeeper-x64.exe
          ./artifacts/VolumeKeeper-x86.exe
          ./artifacts/VolumeKeeper-Setup-x64.exe
          ./artifacts/VolumeKeeper-Setup-x86.exe
